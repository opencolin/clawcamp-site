function pad(n) { return String(n).padStart(2, "0"); }
function getUTCCountdown() {
  const now = new Date();
  const midnight = new Date(now); midnight.setUTCHours(24, 0, 0, 0);
  const diff = midnight - now;
  return { h: Math.floor(diff / 3600000), m: Math.floor((diff % 3600000) / 60000), s: Math.floor((diff % 60000) / 1000), pct: (1 - diff / 86400000) * 100 };
}
function generateAIScore(formData) {
  const demo   = formData.demo?.length   > 5  ? Math.floor(Math.random() * 4) + 20 : Math.floor(Math.random() * 6) + 12;
  const code   = formData.github?.length > 5  ? Math.floor(Math.random() * 4) + 19 : Math.floor(Math.random() * 6) + 11;

  const social = formData.tweet?.includes("#AIFaucet") ? Math.floor(Math.random() * 5) + 18 : Math.floor(Math.random() * 6) + 10;
  return { demo, code, creat, social, total: demo + code + creat + social };
}

function SubmitTab({ user, onSubmitted, existing }) {
  const [step, setStep] = useState(existing ? "done" : "form");
  const [f, setF] = useState({ title:"", demo:"", github:"", tweet:"" });
  const [genPost, setGenPost] = useState(false);
  const [judgeLog, setJudgeLog] = useState([]);
  const [scores, setScores] = useState(null);
  const [errs, setErrs] = useState({});

  const JUDGE_STEPS = [
    "Fetching GitHub repo\u2026",
    "Scanning commit history \u2014 verifying timestamps\u2026",
    "Analyzing code structure and dependencies\u2026",
    "Loading live demo URL\u2026",
    "Running performance and UX checks\u2026",
    "Verifying social post \u2014 checking #AIFaucet tag\u2026",
    "Cross-referencing against all submissions\u2026",
    "Computing final score\u2026",
  ];

  const handleGenPost = () => {
    setGenPost(true);
    const post = 'Just shipped "' + (f.title||"my build") + '" for the #AIFaucet daily hackathon \ud83d\udd25\n\nVoice-to-code agent built on @Nebius_AI Token Factory. 24hrs. Zero sleep. Live demo: ' + (f.demo||"[url]") + '\nCode: ' + (f.github||"[github]") + '\n\n#BuildInPublic #AIFaucet #DAY247 #NebiusAI';
    setTimeout(() => { setF(p=>({...p,tweet:post})); setGenPost(false); }, 1400);
  };

  const submit = () => {
    const e = {};
    if (!f.title.trim()) e.title=1;
    if (!f.demo.trim()) e.demo=1;
    if (!f.github.trim()) e.github=1;
    if (!f.tweet.trim()) e.tweet=1;
    setErrs(e);
    if (Object.keys(e).length) return;
    setStep("judging");
    setJudgeLog([]);
    const s = generateAIScore(f);
    let i = 0;
    const iv = setInterval(() => {
      setJudgeLog(p=>[...p,JUDGE_STEPS[i]]);
      i++;
      if (i >= JUDGE_STEPS.length) {
        clearInterval(iv);
        setTimeout(() => { setScores(s); setStep("done"); onSubmitted({...f,scores:s}); }, 500);
      }
    }, 520);
  };

  if (step === "judging") return (
    <div className="fadein">
      <div className="card" style={{ padding:30 }}>
        <div style={{ fontSize:10,color:"#3d6644",letterSpacing:"0.14em",marginBottom:20 }}>{"\u2696"} AI JUDGE EVALUATING YOUR SUBMISSION</div>
        {judgeLog.map((msg,i)=>(

  }, []);

  const handleSubmitted = useCallback((formData) => {
    const s = formData.scores;
    const total = Object.values(s).reduce((a,b)=>a+b,0);
    const newSub = {
      id:"s_"+user.id, userId:user.id,
      handle:user.handle, name:user.name, avatar:user.avatar,
      title:formData.title, demo:formData.demo,
      github:formData.github, tweet:formData.tweet,
      scores:s, total, status:"judged",
      time:"just now",
      verified:formData.tweet?.includes("#AIFaucet")&&formData.tweet?.includes("@Nebius"),
    };
    setUserSub(newSub);
    setAllSubs(prev=>[newSub,...prev]);
  }, [user]);

  const handleLogout = () => { setUser(null); setUserSub(null); setAllSubs(SEED_SUBMISSIONS); setTab("today"); };

  if (!user) return <AuthScreen onAuth={setUser} />;

  const TABS = [["today","\u26a1 TODAY"],["\u0073ubmit","\u2197 SUBMIT"],["leaderboard","\u25ce BOARD"],["profile","\u25cb PROFILE"],["sponsor","$ SPONSOR"]];

  return (
    <div style={{ background:"#060c07",minHeight:"100vh",fontFamily:"'IBM Plex Mono',monospace",color:"#e8f5e9" }}>
      <div style={{ background:"#060c07",borderBottom:"1px solid #0e1a10",position:"sticky",top:0,zIndex:100 }}>
        <div style={{ maxWidth:860,margin:"0 auto",padding:"0 18px" }}>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:13,paddingBottom:8 }}>
            <div style={{ display:"flex",alignItems:"center",gap:10 }}>
              <FaucetLogo size={21} />
              <span style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:19,color:"#00ff88",letterSpacing:"0.05em" }}>AI FAUCET</span>
              <span style={{ fontSize:10,color:"#1e2e22",letterSpacing:"0.1em",marginLeft:2 }}>DAY #{CHALLENGE.day}</span>
            </div>
            <div style={{ display:"flex",gap:10,alignItems:"center" }}>
              <CDTimer time={time} />
              <div className="av" style={{ width:28,height:28,background:"#0d1a10",border:"1px solid #00ff8840",color:"#00ff88",fontSize:11,cursor:"pointer" }} onClick={()=>setTab("profile")}>{user.avatar}</div>
            </div>
          </div>
          <div style={{ display:"flex",overflowX:"auto" }}>
            {[["today","\u26a1 TODAY"],["submit","\u2197 SUBMIT"],["leaderboard","\u25ce BOARD"],["profile","\u25cb PROFILE"],["sponsor","$ SPONSOR"]].map(([k,l])=>(
              <button key={k} className={"ntab "+(tab===k?"act":"")} onClick={()=>setTab(k)} style={{ position:"relative" }}>
                {l}
                {k==="submit"&&userSub&&<span style={{ position:"absolute",top:6,right:6,width:5,height:5,borderRadius:"50%",background:"#00ff88" }} />}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:860,margin:"0 auto",padding:"24px 18px 80px" }}>
        {tab==="today"       && <TodayTab time={time} onSubmit={()=>setTab("submit")} />}
        {tab==="submit"      && <SubmitTab user={user} onSubmitted={handleSubmitted} existing={userSub} />}
        {tab==="leaderboard" && <LeaderboardTab user={user} allSubmissions={allSubs} />}
        {tab==="profile"     && <ProfileTab user={user} userSubmission={userSub} onLogout={handleLogout} />}
        {tab==="sponsor"     && <SponsorTab />}
      </div>

      <div style={{ position:"fixed",bottom:0,left:0,right:0,background:"#060c07",borderTop:"1px solid #0e1a10",padding:"7px 0",zIndex:100 }}>
        <div style={{ maxWidth:860,margin:"0 auto",padding:"0 18px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
          <span style={{ fontSize:10,color:"#1e2e22" }}>Powered by <span style={{color:"#3d6644"}}>Nebius AI</span></span>
          <span style={{ fontSize:10,color:"#1e2e22" }}>{allSubs.length} submissions today</span>
          <span style={{ fontSize:10,color:"#00ff88" }}>${CHALLENGE.prize} LIVE</span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AIFaucet));
</script>
</body>
</html>
