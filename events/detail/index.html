<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem("claw-theme");if(!t)t=(window.matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches)?"dark":"light";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — ClawCamp</title>
<meta name="description" content="ClawCamp event details, speakers, schedule and how to RSVP.">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
  .ev-status-bar { background:#d32f2f;color:white;padding:10px 48px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px; }
  .ev-status-bar.visible { display:flex; }
  .ev-breadcrumb { padding:20px 48px 0;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap; }
  .ev-breadcrumb a { color:var(--muted);text-decoration:none; }
  .ev-breadcrumb a:hover { color:var(--rust); }
  .ev-breadcrumb .sep { opacity:0.4; }
  .ev-hero { display:grid;grid-template-columns:1fr 400px;gap:40px;padding:32px 48px 0;align-items:start;max-width:1100px; }
  .ev-tag { display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:14px; }
  .ev-title { font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-0.03em;line-height:1.1;margin-bottom:20px; }
  .ev-meta-block { display:flex;flex-direction:column;gap:10px;margin-bottom:28px; }
  .ev-meta-row { display:flex;align-items:center;gap:8px;font-size:15px; }
  .ev-meta-icon { font-size:16px;width:20px;flex-shrink:0; }
  .ev-rsvp-btn { display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--rust);color:white;border-radius:30px;font-weight:700;font-size:16px;text-decoration:none;transition:background 0.15s; }
  .ev-rsvp-btn:hover { background:#a8420a; }
  .ev-hero-image { border-radius:16px;overflow:hidden;background:var(--cream); }
  .ev-hero-image img { width:100%;aspect-ratio:1/1;object-fit:cover;display:block; }
  .ev-hero-image-placeholder { width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#1a1a2e,#0f3460); }
  .ev-body { display:grid;grid-template-columns:1fr 320px;gap:48px;padding:48px;max-width:1100px;align-items:start; }
  .ev-section { margin-bottom:48px; }
  .ev-section-title { font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--sand); }
  .ev-desc-text { font-size:15px;line-height:1.75;color:var(--ink); }
  .ev-desc-text p { margin-bottom:14px; }
  .speakers-carousel-wrap { position:relative; }
  .speakers-carousel { display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px;scrollbar-width:none; }
  .speakers-carousel::-webkit-scrollbar { display:none; }
  .spk-card { flex-shrink:0;width:160px;scroll-snap-align:start;border-radius:12px;overflow:hidden;border:1px solid var(--sand); }
  .spk-photo { width:160px;height:160px;object-fit:cover;display:block;background:var(--sand); }
  .spk-photo-placeholder { width:160px;height:160px;background:linear-gradient(135deg,var(--sand),var(--cream));display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:var(--muted); }
  .spk-info { padding:12px;background:var(--surface); }
  .spk-name { font-size:13px;font-weight:700;margin-bottom:2px; }
  .spk-role { font-size:11px;color:var(--muted); }
  .spk-org { font-size:11px;color:var(--rust);font-weight:600; }
  .carousel-nav { display:flex;gap:8px;margin-top:12px; }
  .carousel-btn { width:36px;height:36px;border-radius:50%;border:1px solid var(--sand);background:var(--surface);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s; }
  .carousel-btn:hover { border-color:var(--ink); }
  .tba-note { font-size:13px;color:var(--muted);margin-top:12px;font-style:italic; }
  .schedule-timeline { display:flex;flex-direction:column; }
  .sched-block { display:grid;grid-template-columns:100px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid var(--cream); }
  .sched-block:last-child { border-bottom:none; }
  .sched-time { font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);padding-top:2px;white-space:nowrap; }
  .sched-title { font-size:15px;font-weight:700;margin-bottom:3px; }
  .sched-speaker { font-size:13px;color:var(--rust); }
  .sidebar-card { border:1px solid var(--sand);border-radius:12px;padding:24px;background:var(--surface);margin-bottom:20px; }
  .sidebar-card h4 { font-size:14px;font-weight:700;margin-bottom:16px; }
  .sidebar-cta { display:flex;flex-direction:column;gap:10px; }
  .sidebar-cta a { display:block;padding:12px 16px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;text-align:center;transition:all 0.15s; }
  .sidebar-cta-primary { background:var(--rust);color:white; }
  .sidebar-cta-primary:hover { background:#a8420a; }
  .sidebar-cta-secondary { border:1px solid var(--sand);color:var(--ink); }
  .sidebar-cta-secondary:hover { border-color:var(--ink); }
  .sidebar-detail-list { display:flex;flex-direction:column;gap:12px; }
  .sidebar-detail-row { display:flex;gap:10px;font-size:14px; }
  .sidebar-detail-icon { font-size:16px;flex-shrink:0; }
  .sidebar-detail-text { line-height:1.4; }
  .sidebar-detail-text small { display:block;font-size:12px;color:var(--muted); }
  .sponsor-logos { display:flex;flex-wrap:wrap;gap:20px;align-items:center; }
  .sponsor-logo-link { display:flex;align-items:center;justify-content:center;padding:16px 24px;border:1px solid var(--sand);border-radius:10px;opacity:0.8;transition:opacity 0.15s;text-decoration:none; }
  .sponsor-logo-link:hover { opacity:1;border-color:var(--ink); }
  .sponsor-name-text { font-size:16px;font-weight:700;color:var(--ink); }
  .about-block { padding:48px;background:var(--cream);border-top:1px solid var(--sand); }
  .about-block h3 { font-size:20px;font-weight:800;margin-bottom:12px; }
  .about-block p { font-size:15px;color:var(--muted);line-height:1.7;max-width:680px; }
  .get-involved-band { padding:48px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;border-top:1px solid var(--sand); }
  .gi-card { border:1px solid var(--sand);border-radius:12px;padding:24px;text-decoration:none;color:var(--ink);transition:all 0.15s; }
  .gi-card:hover { border-color:var(--rust);transform:translateY(-2px); }
  .gi-icon { font-size:28px;margin-bottom:12px;display:block; }
  .gi-card h4 { font-size:15px;font-weight:700;margin-bottom:6px; }
  .gi-card p { font-size:13px;color:var(--muted);line-height:1.4; }
  .ev-loading { min-height:50vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px; }
  .ev-spinner { width:40px;height:40px;border:4px solid var(--sand);border-top-color:var(--rust);border-radius:50%;animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .ev-notfound { text-align:center;padding:80px 48px; }
  .ev-notfound h2 { font-size:24px;font-weight:800;margin-bottom:8px; }
  .ev-notfound p { color:var(--muted);margin-bottom:24px; }
  /* --- Living recap (v1.5) — replaces the muted "ended" banner for past
        events that have a recap. All content rendered via $()/textContent. --- */
  .recap-headline { font-size:clamp(20px,3vw,28px);font-weight:800;letter-spacing:-0.02em;line-height:1.2;margin-bottom:16px; }
  .recap-body { font-size:15px;line-height:1.75;color:var(--ink);margin-bottom:24px; }
  .recap-body p { margin-bottom:14px; }
  .recap-attended { display:inline-flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:20px; }
  .recap-attended .recap-attended-dot { width:7px;height:7px;border-radius:50%;background:var(--moss,#2d4a2f);flex-shrink:0; }
  .recap-attended b { color:var(--ink);font-weight:500; }
  .recap-gallery { display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px; }
  .recap-gallery img { width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;display:block;background:var(--sand);border:1px solid var(--sand); }
  .recap-link { display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:var(--rust);color:white;border-radius:24px;font-weight:700;font-size:14px;text-decoration:none;transition:background 0.15s; }
  .recap-link:hover { background:#a8420a; }
  .recap-link-inert { display:inline-block;font-size:13px;color:var(--muted);word-break:break-all; }
  /* --- Inline RSVP (v1.3) --- */
  .rsvp-count { display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:14px; }
  .rsvp-count .rsvp-count-dot { width:7px;height:7px;border-radius:50%;background:var(--moss,#2d4a2f);flex-shrink:0; }
  .rsvp-count b { color:var(--ink);font-weight:500; }
  .rsvp-form { display:flex;flex-direction:column;gap:10px;margin-bottom:14px; }
  .rsvp-form input[type=text],.rsvp-form input[type=email] { width:100%;padding:11px 13px;border:1px solid var(--sand);border-radius:8px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--ink);box-sizing:border-box; }
  .rsvp-form input:focus { outline:none;border-color:var(--rust); }
  .rsvp-form button { padding:12px 16px;border:none;border-radius:8px;background:var(--rust);color:white;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background 0.15s; }
  .rsvp-form button:hover { background:#a8420a; }
  .rsvp-form button:disabled { opacity:0.6;cursor:default; }
  .rsvp-hp { position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden; }
  .rsvp-note { font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:12px; }
  .rsvp-note.err { color:#c62828; }
  .rsvp-confirm { display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:8px;background:var(--moss-light,#eaf0ea);color:var(--moss,#2d4a2f);font-size:14px;font-weight:700;margin-bottom:14px; }
  .rsvp-cal { margin-bottom:14px; }
  .rsvp-cal-label { font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px; }
  .rsvp-cal-links { display:flex;flex-wrap:wrap;gap:8px; }
  .rsvp-cal-links a { flex:1;min-width:88px;text-align:center;padding:9px 10px;border:1px solid var(--sand);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;color:var(--ink);transition:border-color 0.15s; }
  .rsvp-cal-links a:hover { border-color:var(--ink); }
  .rsvp-invite { margin-top:16px;padding-top:16px;border-top:1px solid var(--cream); }
  .rsvp-invite h5 { font-size:13px;font-weight:700;margin-bottom:4px; }
  .rsvp-invite p { font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.4; }
  .rsvp-invite-row { display:flex;gap:8px;margin-bottom:10px; }
  .rsvp-invite-row input { flex:1;padding:9px 11px;border:1px solid var(--sand);border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;background:var(--cream);color:var(--ink);box-sizing:border-box; }
  .rsvp-invite-row button { padding:9px 14px;border:1px solid var(--ink);border-radius:8px;background:var(--ink);color:white;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap; }
  .rsvp-invite-share { display:flex;gap:8px; }
  .rsvp-invite-share a { flex:1;text-align:center;padding:8px 10px;border:1px solid var(--sand);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;color:var(--ink);transition:border-color 0.15s; }
  .rsvp-invite-share a:hover { border-color:var(--ink); }
  @media (max-width:768px) {
    .ev-hero { grid-template-columns:1fr;padding:24px 20px 0; }
    .ev-hero-image { order:-1; }
    .ev-breadcrumb { padding:16px 20px 0; }
    .ev-status-bar { padding:10px 20px; }
    .ev-body { grid-template-columns:1fr;padding:32px 20px; }
    .ev-sidebar { order:-1; }
    .about-block,.get-involved-band { padding:32px 20px; }
  }
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="ev-loading" id="ev-loading">
  <div class="ev-spinner"></div>
  <p style="font-size:14px;color:var(--muted)">Loading event...</p>
</div>

<div id="ev-content" style="display:none"></div>

<div class="ev-notfound" id="ev-notfound" style="display:none">
  <h2>Event not found</h2>
  <p>This event doesn&rsquo;t exist or hasn&rsquo;t been published yet.</p>
  <a href="/events" class="btn-rust">Browse all events →</a>
</div>

<div id="site-footer"></div>
<script src="/js/config.js"></script>
<script src="/js/nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.js" integrity="sha384-m/8UHFJHeU6nrCKP2hBnAseuvAKUmLF+8e5bWos5CJL023vuxX7kiVL5t8yjsJhV" crossorigin="anonymous"></script>
<script>
var SUPABASE_URL = window.CLAWCAMP_CONFIG.SUPABASE_URL;
var SUPABASE_KEY = window.CLAWCAMP_CONFIG.SUPABASE_ANON_KEY;

// Canonical production origin for share metadata (OG/Twitter/JSON-LD URLs must
// be absolute prod URLs for crawlers/unfurlers, not the preview-deploy host).
var SITE_ORIGIN = 'https://claw.camp';

function $(tag, cls, text) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text != null) el.textContent = text;
  return el;
}

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function initials(name) {
  return (name || '?').split(/\s+/).slice(0,2).map(function(p){ return p[0]||''; }).join('').toUpperCase();
}

var DEFAULT_OG_IMAGE = SITE_ORIGIN + '/og-image.png';

// Upsert a <meta> tag in <head>, matched by name= or property=. Always sets
// the value via .setAttribute('content', value) — never innerHTML — so a
// hostile event field can't inject markup. attr is 'name' or 'property'.
function setMeta(attr, key, value) {
  if (value == null) return;
  var sel = 'meta[' + attr + '="' + key + '"]';
  var el = document.head.querySelector(sel);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute(attr, key);
    document.head.appendChild(el);
  }
  el.setAttribute('content', value);
}

// ---------------------------------------------------------------------------
// Living recap (v1.5) helpers. The recap columns (recap_url, recap_photos_url,
// recap_headline, recap_body) arrive on `ev` automatically because loadEvent()
// already selects * — no query change. Everything below degrades gracefully if
// migration 0008 hasn't been applied (columns absent => values undefined).
// ---------------------------------------------------------------------------

// STRICT scheme check for an event-supplied URL. Mirrors the captains-console /
// admin posture: an untrusted href could carry a javascript:/data: scheme, so a
// value is only ever turned into a live <a> when it explicitly starts with
// http:// or https://. Anything else is treated as inert text by the caller.
function isSafeHttpUrl(val) {
  return typeof val === 'string' && /^https?:\/\//i.test(val.trim());
}

// Derive the public URL for a Storage object in the 'media' bucket from its
// stored path. We build the well-known public-object REST URL rather than
// trusting any caller-supplied absolute URL; the path segment is encoded so a
// hostile path can't escape the URL. Returns '' for an unusable input.
function mediaPublicUrl(path) {
  if (typeof path !== 'string') return '';
  var p = path.trim();
  if (!p) return '';
  // If a recap already stored an absolute http(s) URL, honor it as-is (still
  // scheme-checked); otherwise treat it as a bucket-relative object path.
  if (isSafeHttpUrl(p)) return p;
  p = p.replace(/^\/+/, ''); // drop any leading slashes before encoding
  return SUPABASE_URL + '/storage/v1/object/public/media/' +
    p.split('/').map(encodeURIComponent).join('/');
}

// Normalize ev.recap_photos_url (a Postgres text[] arrives as a JS array, but
// tolerate a JSON-string or a single string) into an array of non-empty paths.
function recapPhotoPaths(ev) {
  var raw = ev && ev.recap_photos_url;
  if (raw == null) return [];
  if (typeof raw === 'string') {
    var s = raw.trim();
    if (!s) return [];
    try { var parsed = JSON.parse(s); if (Array.isArray(parsed)) raw = parsed; else raw = [s]; }
    catch (e) { raw = [s]; }
  }
  if (!Array.isArray(raw)) return [];
  return raw.filter(function(p){ return typeof p === 'string' && p.trim(); });
}

// hasRecap === the event is past AND carries at least one piece of recap
// content. Drives both the banner suppression and the OG/JSON-LD upgrade.
function eventHasRecap(ev, isPast) {
  if (!isPast || !ev) return false;
  return !!(isSafeHttpUrl(ev.recap_url) ||
    recapPhotoPaths(ev).length ||
    (ev.recap_headline && String(ev.recap_headline).trim()) ||
    (ev.recap_body && String(ev.recap_body).trim()));
}

// Inject per-event share metadata (OG / Twitter / schema.org Event JSON-LD)
// into <head> client-side. Deferred from v1.0 — unblocked now that approved
// status + structured data exist. Everything is set via attributes/textContent
// (never innerHTML), so all event-supplied strings stay inert. Because the
// parent fetch is RLS-gated to approved-only, drafts/spam never reach here.
// `isPast` drives the EventScheduled -> EventCompleted status transition; when
// the event has a recap we prefer a recap photo for the OG/JSON-LD image so a
// past-event URL unfurls with a recap card.
function injectShareMeta(ev, isPast) {
  var title = (ev.name || 'Event') + ' — ClawCamp';
  // Prefer the structured description; fall back to the page's default copy.
  var desc = (ev.description || 'ClawCamp event details, speakers, schedule and how to RSVP.')
    .replace(/\s+/g, ' ').trim().slice(0, 300);
  var canonical = SITE_ORIGIN + '/events/detail?id=' + encodeURIComponent(ev.id != null ? ev.id : '');

  // When the event has a recap, prefer its first photo for the share card so a
  // past-event URL unfurls with a recap image. Fall back to the event image,
  // then the site default. recapImg is also reused for jsonLd.image below.
  var hasRecap = eventHasRecap(ev, isPast);
  var recapImg = '';
  if (hasRecap) {
    var paths = recapPhotoPaths(ev);
    if (paths.length) recapImg = mediaPublicUrl(paths[0]);
  }
  var image = recapImg || ev.image_url || DEFAULT_OG_IMAGE;

  setMeta('name', 'description', desc);
  setMeta('property', 'og:title', title);
  setMeta('property', 'og:description', desc);
  setMeta('property', 'og:type', 'event');
  setMeta('property', 'og:url', canonical);
  setMeta('property', 'og:image', image);
  setMeta('name', 'twitter:card', 'summary_large_image');
  setMeta('name', 'twitter:title', title);
  setMeta('name', 'twitter:description', desc);
  setMeta('name', 'twitter:image', image);

  // schema.org Event JSON-LD, assembled as a plain object and serialized with
  // JSON.stringify into a text node — no string concatenation of event data
  // into markup, so stored values cannot break out of the <script> block.
  var jsonLd = {
    '@context': 'https://schema.org',
    '@type': 'Event',
    'name': ev.name || '',
    'description': desc,
    'url': canonical
  };
  // The plan's EventScheduled -> EventCompleted transition: a past event is
  // marked completed so crawlers stop treating it as an upcoming listing.
  jsonLd.eventStatus = isPast ? 'https://schema.org/EventCompleted' : 'https://schema.org/EventScheduled';
  if (ev.event_date) {
    jsonLd.startDate = ev.event_date;
  }
  // Prefer the recap photo (already scheme-checked / encoded) so the structured
  // image matches the recap OG card; fall back to the event's own image.
  if (recapImg) {
    jsonLd.image = recapImg;
  } else if (ev.image_url) {
    jsonLd.image = ev.image_url;
  }
  if (ev.venue_name || ev.location) {
    jsonLd.location = {
      '@type': 'Place',
      'name': ev.venue_name || ev.location || '',
      'address': ev.location || ''
    };
  }
  jsonLd.organizer = {
    '@type': 'Organization',
    'name': 'ClawCamp',
    'url': SITE_ORIGIN + '/'
  };

  var ldEl = document.getElementById('ev-jsonld');
  if (!ldEl) {
    ldEl = document.createElement('script');
    ldEl.type = 'application/ld+json';
    ldEl.id = 'ev-jsonld';
    document.head.appendChild(ldEl);
  }
  ldEl.textContent = JSON.stringify(jsonLd);
}

var eventId = getParam('id');
var eventSlug = getParam('slug');

var REST_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

// Fetch a child table by event_id, returning [] on any failure so a transient
// error (or a not-yet-applied migration) just yields an empty section rather
// than regressing the page — the static EVENT_EXTRAS registry is retired (v2.0).
function fetchChild(table, id, select) {
  var url = SUPABASE_URL + '/rest/v1/' + table +
    '?event_id=eq.' + encodeURIComponent(id) +
    '&select=' + select +
    '&order=sort_order.asc';
  return fetch(url, { headers: REST_HEADERS })
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(rows){ return Array.isArray(rows) ? rows : []; })
    .catch(function(){ return []; });
}

function loadEvent() {
  var query;
  if (eventId) {
    query = SUPABASE_URL + '/rest/v1/events?id=eq.' + encodeURIComponent(eventId) + '&select=*&limit=1';
  } else if (eventSlug) {
    query = SUPABASE_URL + '/rest/v1/events?name=ilike.*' + encodeURIComponent(eventSlug) + '*&select=*&limit=1';
  } else {
    showNotFound();
    return;
  }
  fetch(query, { headers: REST_HEADERS })
    .then(function(r){ return r.json(); })
    .then(function(rows) {
      if (!rows || !rows.length) { showNotFound(); return; }
      var ev = rows[0];
      // DB-only: pull structured content from the per-event child tables
      // (slice A grants anon SELECT on these; the events approved-only RLS
      // already gated the parent fetch). Each resolves to [] on failure, so a
      // sparsely-populated or briefly-unreachable DB just hides the rich
      // sections while the core event header still renders (the static
      // EVENT_EXTRAS registry is retired — there is no longer a JS fallback).
      if (ev.id == null) {
        renderEvent(ev, [], [], []);
        return;
      }
      Promise.all([
        fetchChild('event_speakers', ev.id, 'name,role,org,photo_url,bio'),
        fetchChild('event_schedule', ev.id, 'start_time,end_time,title,speaker'),
        fetchChild('event_sponsors', ev.id, 'sponsor_name,sponsor_url,tier,logo_url')
      ]).then(function(results) {
        renderEvent(ev, results[0], results[1], results[2]);
      });
    })
    .catch(function(){ showNotFound(); });
}

function showNotFound() {
  document.getElementById('ev-loading').style.display = 'none';
  document.getElementById('ev-notfound').style.display = '';
}

// ===========================================================================
// Inline on-site RSVP (v1.3) — additive to the existing Luma CTAs.
// ===========================================================================
// CONTRACT (owned + documented by the rsvp-table-and-edge-function slice):
//   - submit:  POST {SUPABASE_URL}/functions/v1/submit-rsvp  with the same
//              header shape submit-event uses (apikey + Bearer + JSON). Body
//              carries event_id, name, email, status:'going', the honeypot
//              field `website`, and UTM/ref attribution. Server replies
//              { ok:true } on a fresh RSVP, { ok:true, already:true } when the
//              email is already on the list. A bot that fills `website` gets a
//              silent fake-success (mirrors submit-event's honeypot).
//   - count:   POST {SUPABASE_URL}/rest/v1/rpc/rsvp_count  body { event_id } ->
//              a bare integer. It's a SECURITY DEFINER RPC (anon may EXECUTE)
//              precisely so anon never reads the PII roster.
// GRACEFUL FALLBACK (hard requirement): the backend may not be deployed yet.
//   Every network/4xx/5xx path keeps the Luma CTAs clickable and never blanks
//   the page — the count simply renders nothing and the form surfaces a small
//   inline note pointing at Luma. All values are rendered via $()/textContent/
//   setAttribute — never innerHTML — preserving the file's hard XSS rule.

// Pad to 2 digits for UTC calendar timestamps.
function pad2(n) { return (n < 10 ? '0' : '') + n; }

// Format a Date as an iCal/Google UTC basic timestamp: YYYYMMDDTHHMMSSZ.
function calUtc(d) {
  return d.getUTCFullYear() + pad2(d.getUTCMonth() + 1) + pad2(d.getUTCDate()) +
    'T' + pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + 'Z';
}

// All-day basic date (YYYYMMDD), used when only ev.event_date is known.
function calDay(d) {
  return d.getUTCFullYear() + pad2(d.getUTCMonth() + 1) + pad2(d.getUTCDate());
}

// Escape a value for inclusion in an iCalendar property (RFC 5545): backslash,
// semicolon, comma, and newlines. The .ics is downloaded, never rendered, but
// we still keep event-supplied strings inert inside it.
function icsEscape(val) {
  return String(val == null ? '' : val)
    .replace(/\\/g, '\\\\')
    .replace(/;/g, '\\;')
    .replace(/,/g, '\\,')
    .replace(/\r\n|\r|\n/g, '\\n');
}

// Resolve an event's calendar window. Returns { allDay, start, end } as Date
// objects in UTC. ev.time_range (e.g. "6:00 PM – 9:00 PM") has no reliable
// timezone, so we treat it as opaque and fall back to an all-day range keyed
// off ev.event_date — guarding for a missing/garbage date.
function calRange(ev) {
  var base = ev.event_date && /^\d{4}-\d{2}-\d{2}/.test(ev.event_date)
    ? new Date(ev.event_date + 'T00:00:00Z') : null;
  if (!base || isNaN(base.getTime())) return null;
  var next = new Date(base.getTime() + 24 * 60 * 60 * 1000);
  return { allDay: true, start: base, end: next };
}

// Build the "Add to calendar" control (Google link + downloadable .ics) from
// ev fields. All anchors via $()/setAttribute; the ICS is a Blob object URL.
function buildAddToCalendar(ev) {
  var range = calRange(ev);
  if (!range) return null; // no usable date -> no calendar control

  var wrap = $('div', 'rsvp-cal');
  wrap.appendChild($('div', 'rsvp-cal-label', 'Add to calendar'));
  var links = $('div', 'rsvp-cal-links');

  var loc = [ev.venue_name, ev.location].filter(Boolean).join(', ');
  var details = ev.link ? ('RSVP / details: ' + ev.link) : '';
  var dateParam = range.allDay
    ? (calDay(range.start) + '/' + calDay(range.end))
    : (calUtc(range.start) + '/' + calUtc(range.end));

  // Google Calendar — query params are URL-encoded, not HTML.
  var g = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
    '&text=' + encodeURIComponent(ev.name || 'ClawCamp event') +
    '&dates=' + dateParam +
    (details ? '&details=' + encodeURIComponent(details) : '') +
    (loc ? '&location=' + encodeURIComponent(loc) : '');
  var gA = $('a', null, 'Google'); gA.href = g; gA.target = '_blank'; gA.rel = 'noopener';
  links.appendChild(gA);

  // Apple / .ics — assembled as escaped iCalendar text, offered as a Blob.
  var dtLines = range.allDay
    ? ['DTSTART;VALUE=DATE:' + calDay(range.start), 'DTEND;VALUE=DATE:' + calDay(range.end)]
    : ['DTSTART:' + calUtc(range.start), 'DTEND:' + calUtc(range.end)];
  var ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//ClawCamp//Events//EN',
    'CALSCALE:GREGORIAN', 'BEGIN:VEVENT',
    'UID:' + icsEscape((ev.id != null ? ev.id : 'event') + '@claw.camp'),
    'DTSTAMP:' + calUtc(new Date())
  ].concat(dtLines).concat([
    'SUMMARY:' + icsEscape(ev.name || 'ClawCamp event'),
    loc ? 'LOCATION:' + icsEscape(loc) : null,
    details ? 'DESCRIPTION:' + icsEscape(details) : null,
    'END:VEVENT', 'END:VCALENDAR'
  ]).filter(Boolean).join('\r\n');

  var icsA = $('a', null, 'Apple / .ics');
  try {
    var blob = new Blob([ics], { type: 'text/calendar' });
    icsA.href = URL.createObjectURL(blob);
  } catch (e) {
    icsA.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
  }
  icsA.setAttribute('download', 'clawcamp-event.ics');
  links.appendChild(icsA);

  wrap.appendChild(links);
  return wrap;
}

// Reveal the post-RSVP invite-a-friend surface. Council notes: attribution
// (UTM + ref) must arrive WITH this first share surface so early shares are
// trackable. The K-factor/leaderboard is explicitly out of scope here.
function buildInvite(ev) {
  var box = $('div', 'rsvp-invite');
  box.appendChild($('h5', null, 'Bring a friend 🦞'));
  box.appendChild($('p', null, 'Share your invite link — RSVPs from it are credited to you.'));

  // Prefilled, attributable share URL back to this event.
  var url = SITE_ORIGIN + '/events/detail?id=' + encodeURIComponent(ev.id != null ? ev.id : '') +
    '&utm_source=invite&utm_medium=share&utm_campaign=rsvp&ref=' +
    encodeURIComponent('e' + (ev.id != null ? ev.id : ''));

  var row = $('div', 'rsvp-invite-row');
  var field = $('input'); field.type = 'text'; field.readOnly = true; field.value = url;
  field.setAttribute('aria-label', 'Invite link');
  field.onclick = function(){ field.select(); };
  var copyBtn = $('button', null, 'Copy');
  copyBtn.type = 'button';
  copyBtn.onclick = function() {
    function done(){ copyBtn.textContent = 'Copied'; setTimeout(function(){ copyBtn.textContent = 'Copy'; }, 1800); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(done).catch(function(){ field.select(); });
    } else { field.select(); }
  };
  row.appendChild(field); row.appendChild(copyBtn);
  box.appendChild(row);

  // Pre-baked share anchors carrying the same attributed URL.
  var subject = 'Join me at ' + (ev.name || 'this ClawCamp event');
  var share = $('div', 'rsvp-invite-share');
  var mail = $('a', null, 'Email');
  mail.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(subject + ': ' + url);
  var x = $('a', null, 'X');
  x.href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(subject) + '&url=' + encodeURIComponent(url);
  x.target = '_blank'; x.rel = 'noopener';
  var wa = $('a', null, 'WhatsApp');
  wa.href = 'https://wa.me/?text=' + encodeURIComponent(subject + ' ' + url);
  wa.target = '_blank'; wa.rel = 'noopener';
  share.appendChild(mail); share.appendChild(x); share.appendChild(wa);
  box.appendChild(share);
  return box;
}

// Build the inline RSVP block into the sidebar CTA card. Renders ABOVE the
// existing Luma CTA, which stays in place as a secondary action. For external
// events the Luma link is the natural primary ticketing action and the inline
// form acts as a lightweight "notify me" — but both always render.
function buildRsvp(ev, isPast, cta) {
  if (ev.id == null || isPast) return; // RSVP only makes sense for a real, upcoming event
  var isExternal = ev.is_external === true;

  // Container inserted at the TOP of the CTA stack (before the Luma link).
  var box = $('div', 'rsvp-box');

  // --- Live attendee count (best-effort; renders nothing on failure) -------
  var countEl = $('div', 'rsvp-count');
  fetch(SUPABASE_URL + '/rest/v1/rpc/rsvp_count', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ event_id: ev.id })
  }).then(function(r){ return r.ok ? r.json() : null; }).then(function(n) {
    var num = typeof n === 'number' ? n : (n && typeof n.count === 'number' ? n.count : null);
    if (num == null || isNaN(num) || num <= 0) return; // no count -> render nothing
    countEl.appendChild($('span', 'rsvp-count-dot'));
    var line = $('span'); line.appendChild($('b', null, String(num)));
    line.appendChild(document.createTextNode(' going'));
    countEl.appendChild(line);
    box.insertBefore(countEl, box.firstChild);
  }).catch(function(){ /* backend absent — never block the page */ });

  // --- Email-capture form (primary on-site CTA) ----------------------------
  var form = $('form', 'rsvp-form');
  form.setAttribute('novalidate', 'novalidate');
  var nameIn = $('input'); nameIn.type = 'text'; nameIn.name = 'name'; nameIn.placeholder = 'Your name'; nameIn.autocomplete = 'name';
  var emailIn = $('input'); emailIn.type = 'email'; emailIn.name = 'email'; emailIn.placeholder = 'you@email.com'; emailIn.required = true; emailIn.autocomplete = 'email';
  // Honeypot — must be named exactly 'website' to match the Edge Function's
  // silent-drop contract. Visually hidden, off the tab order, no autofill.
  var hp = $('input', 'rsvp-hp'); hp.type = 'text'; hp.name = 'website'; hp.setAttribute('autocomplete', 'off'); hp.tabIndex = -1; hp.setAttribute('aria-hidden', 'true');
  var submit = $('button', null, isExternal ? 'Notify me' : 'RSVP'); submit.type = 'submit';
  var note = $('div', 'rsvp-note');
  form.appendChild(nameIn); form.appendChild(emailIn); form.appendChild(hp); form.appendChild(submit);

  // Replace the form (in place) with a confirmation block + reveal invite.
  function confirmRsvp(message, alreadyOn) {
    var confirm = $('div', 'rsvp-confirm', message);
    box.replaceChild(confirm, form);
    note.textContent = '';
    box.appendChild(buildInvite(ev));
    // Optimistic count bump for a fresh RSVP (not for an already-on-list hit).
    if (!alreadyOn) {
      var b = countEl.querySelector('b');
      if (b) { var cur = parseInt(b.textContent, 10); if (!isNaN(cur)) b.textContent = String(cur + 1); }
    }
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var email = emailIn.value.trim();
    if (!email) { note.className = 'rsvp-note err'; note.textContent = 'Email is required to RSVP.'; return; }
    submit.disabled = true; note.className = 'rsvp-note'; note.textContent = 'Sending…';

    var payload = {
      event_id: ev.id,
      name: nameIn.value.trim(),
      email: email,
      status: 'going',
      website: hp.value, // honeypot — server silently drops if non-empty
      utm_source: getParam('utm_source'),
      utm_medium: getParam('utm_medium'),
      utm_campaign: getParam('utm_campaign'),
      ref: getParam('ref')
    };

    // Same POST/parse shape submit-event uses (res.json().then().catch()).
    fetch(SUPABASE_URL + '/functions/v1/submit-rsvp', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function(res) {
      return res.json().then(function(data){ return { ok: res.ok, status: res.status, data: data }; })
        .catch(function(){ return { ok: res.ok, status: res.status, data: null }; });
    }).then(function(result) {
      if (result.ok && result.data && result.data.already) {
        confirmRsvp("You're already on the list ✓", true);
      } else if (result.ok) {
        confirmRsvp("You're going ✓", false);
      } else {
        // 4xx/5xx from a deployed backend — surface the message, keep Luma.
        submit.disabled = false;
        note.className = 'rsvp-note err';
        var msg = (result.data && result.data.error) ? result.data.error : 'Could not RSVP here.';
        note.textContent = ev.link ? (msg + ' You can still RSVP on Luma below.') : msg;
      }
    }).catch(function() {
      // Network error / Edge Function not deployed (404). NOT a dead end:
      // keep the Luma button visible and point the user at it.
      submit.disabled = false;
      note.className = 'rsvp-note err';
      note.textContent = ev.link ? 'On-site RSVP is unavailable right now — use the Luma link below.'
        : 'On-site RSVP is unavailable right now. Please try again later.';
    });
  });

  box.appendChild(form);
  box.appendChild(note);

  // Add-to-calendar sits with the RSVP control.
  var cal = buildAddToCalendar(ev);
  if (cal) box.appendChild(cal);

  // Insert the whole block at the top of the CTA stack (above Luma).
  cta.insertBefore(box, cta.firstChild);
}

function renderEvent(ev, dbSpeakers, dbSchedule, dbSponsors) {
  document.getElementById('ev-loading').style.display = 'none';
  var content = document.getElementById('ev-content');
  content.style.display = '';
  document.title = ev.name + ' — ClawCamp';

  // Determine event lifecycle once up front: upcoming / today / past, and
  // whether a past event carries a living recap. Computed here (not just in the
  // status-banner block) so injectShareMeta() can mark EventCompleted and the
  // recap section/CTA can react. hasRecap is false unless isPast (graceful
  // fallback: a past event with no recap keeps the muted "ended" banner).
  var today = new Date();
  var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  var isPast = ev.event_date < todayStr;
  var hasRecap = eventHasRecap(ev, isPast);

  // Per-event share metadata (OG / Twitter / JSON-LD). Built purely via DOM
  // APIs + textContent/JSON.stringify (never innerHTML) so it stays XSS-safe.
  // The parent fetch is RLS-gated to approved-only, so drafts/spam can never
  // reach this code path and emit tags. isPast drives EventCompleted + recap OG.
  injectShareMeta(ev, isPast);

  dbSpeakers = dbSpeakers || [];
  dbSchedule = dbSchedule || [];
  dbSponsors = dbSponsors || [];

  // Normalize DB rows back to the exact render-shape keys the existing render
  // code already uses, so the DOM-building code below stays nearly identical.
  var dbSpeakersN = dbSpeakers.map(function(row) {
    return { name: row.name, role: row.role, org: row.org, photo: row.photo_url };
  });
  var dbScheduleN = dbSchedule.map(function(row) {
    var time = row.start_time || '';
    if (row.end_time) time = time + '–' + row.end_time;
    return { time: time, title: row.title, speaker: row.speaker };
  });
  var dbSponsorsN = dbSponsors.map(function(row) {
    return { name: row.sponsor_name, url: row.sponsor_url, logo: row.logo_url };
  });

  // DB-only (v2.0): the static js/event-extras.js registry has been RETIRED now
  // that the DB-first path shipped in v1.2 — `extras` is now always an empty
  // object, so every rich section reads SOLELY from the per-event child tables.
  // `extras` is kept as an empty stand-in (rather than ripped out) so the
  // section-gating below is unchanged: an event with zero child rows and no
  // description simply omits those sections while the core header/date/venue/
  // RSVP (built straight from the events row) still render — i.e. a real but
  // sparsely-populated row never produces a blank page. fullDescription has no
  // DB column, so it now always resolves to undefined and the Description
  // section is driven purely by ev.description.
  var extras = {};
  var speakers = dbSpeakersN.length ? dbSpeakersN : (extras.speakers || []);
  var schedule = dbScheduleN.length ? dbScheduleN : (extras.schedule || []);
  var sponsorsFromSrc = dbSponsorsN.length ? dbSponsorsN : (extras.sponsors || []);

  // --- Status banner (happening now) ---
  var statusBar = $('div', 'ev-status-bar');
  var dot = $('span', 'live-dot');
  dot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:white;animation:live-pulse 1.4s ease-in-out infinite';
  statusBar.appendChild(dot);
  statusBar.appendChild(document.createTextNode('This event is happening right now'));
  // Lifecycle (isPast/hasRecap) was computed up top. A past event that carries
  // a recap suppresses the muted "ended" banner in favor of the living recap
  // section rendered in the main column below; a past event WITHOUT a recap
  // keeps the exact muted "ended" banner unchanged (graceful fallback).
  if (ev.event_date === todayStr) {
    statusBar.classList.add('visible');
  } else if (isPast && !hasRecap) {
    // Past event, no recap — show a muted "ended" banner instead
    statusBar.textContent = '';
    statusBar.style.background = 'var(--muted)';
    statusBar.appendChild(document.createTextNode('📦 This event has ended — browse '));
    var upLink = document.createElement('a');
    upLink.href = '/events';
    upLink.textContent = 'upcoming events';
    upLink.style.cssText = 'color:white;text-decoration:underline;margin-left:4px';
    statusBar.appendChild(upLink);
    statusBar.classList.add('visible');
  }
  content.appendChild(statusBar);

  // --- Breadcrumb ---
  var bc = $('div', 'ev-breadcrumb');
  var allLink = $('a', null, 'All Events'); allLink.href = '/events';
  bc.appendChild(allLink);
  bc.appendChild($('span', 'sep', '›'));
  var loc = ev.location || ev.city || 'ClawCamp';
  bc.appendChild($('span', null, loc));
  content.appendChild(bc);

  // --- Hero ---
  var hero = $('div', 'ev-hero');
  var left = $('div', 'ev-hero-left');
  var typeLabel = (ev.event_type || 'community');
  typeLabel = typeLabel.charAt(0).toUpperCase() + typeLabel.slice(1);
  left.appendChild($('div', 'ev-tag', '🌍 ' + loc + '  ·  ' + typeLabel));
  left.appendChild($('h1', 'ev-title', ev.name));

  var metaBlock = $('div', 'ev-meta-block');
  function metaRow(icon, text) {
    var r = $('div', 'ev-meta-row');
    r.appendChild($('span', 'ev-meta-icon', icon));
    r.appendChild($('span', null, text));
    return r;
  }
  metaBlock.appendChild(metaRow('📅', fmtDate(ev.event_date) + (ev.time_range ? ' · ' + ev.time_range : '')));
  if (ev.venue_name || ev.location) {
    metaBlock.appendChild(metaRow('📍', [ev.venue_name, ev.location].filter(Boolean).join(', ')));
  }
  metaBlock.appendChild(metaRow('🎟️', 'Free · RSVP required'));
  left.appendChild(metaBlock);

  if (ev.link) {
    // Past events keep the (muted) Luma link as a secondary action; when a
    // recap exists, relabel it to read as a wrap-up reference rather than a CTA.
    var heroLumaLabel = isPast ? (hasRecap ? 'View event on Luma →' : 'View on Luma →') : 'RSVP on Luma →';
    var rsvp = $('a', 'ev-rsvp-btn', heroLumaLabel);
    rsvp.href = ev.link; rsvp.target = '_blank'; rsvp.rel = 'noopener';
    if (isPast) rsvp.style.background = 'var(--muted)';
    left.appendChild(rsvp);
  }
  hero.appendChild(left);

  var heroImg = $('div', 'ev-hero-image');
  if (ev.image_url) {
    var img = $('img'); img.src = ev.image_url; img.alt = ev.name; img.loading = 'lazy';
    heroImg.appendChild(img);
  } else {
    var ph = $('div', 'ev-hero-image-placeholder', '🦞');
    heroImg.appendChild(ph);
  }
  hero.appendChild(heroImg);
  content.appendChild(hero);

  // --- Body ---
  var body = $('div', 'ev-body');
  var main = $('div', 'ev-main');

  // --- Living recap (v1.5) ---
  // Only for a past event that actually carries recap content (hasRecap). Leads
  // the main column so the page reads as a wrap-up, not a dead listing. Every
  // value is rendered via $()/textContent/setAttribute — never innerHTML — so a
  // hostile recap_headline/recap_body/photo path stays inert.
  if (hasRecap) {
    var recapSec = $('div', 'ev-section');
    recapSec.appendChild($('div', 'ev-section-title', 'Recap'));

    // Headline (optional).
    if (ev.recap_headline && String(ev.recap_headline).trim()) {
      recapSec.appendChild($('h2', 'recap-headline', String(ev.recap_headline)));
    }

    // Attendee line — best-effort, reuses the SAME rsvp_count RPC buildRsvp()
    // calls. Inserted only when a positive count comes back; renders nothing on
    // any failure (RPC absent, network error, zero/non-numeric).
    if (ev.id != null) {
      var attended = $('div', 'recap-attended');
      fetch(SUPABASE_URL + '/rest/v1/rpc/rsvp_count', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ event_id: ev.id })
      }).then(function(r){ return r.ok ? r.json() : null; }).then(function(n) {
        var num = typeof n === 'number' ? n : (n && typeof n.count === 'number' ? n.count : null);
        if (num == null || isNaN(num) || num <= 0) return; // no count -> render nothing
        attended.appendChild($('span', 'recap-attended-dot'));
        var line = $('span'); line.appendChild($('b', null, String(num)));
        line.appendChild(document.createTextNode(' attended'));
        attended.appendChild(line);
      }).catch(function(){ /* best-effort — render nothing on failure */ });
      recapSec.appendChild(attended);
    }

    // Body — split on blank lines into paragraphs, same as the Description block.
    if (ev.recap_body && String(ev.recap_body).trim()) {
      var recapBody = $('div', 'recap-body');
      String(ev.recap_body).split(/\n\n+/).forEach(function(para) {
        recapBody.appendChild($('p', null, para));
      });
      recapSec.appendChild(recapBody);
    }

    // Photo gallery — each stored Storage path resolved to its public media URL,
    // rendered as an <img> with src/alt set by attribute, lazy-loaded, and an
    // onerror that drops a broken image so a stale path leaves no gap.
    var photoPaths = recapPhotoPaths(ev);
    if (photoPaths.length) {
      var gallery = $('div', 'recap-gallery');
      photoPaths.forEach(function(path, i) {
        var url = mediaPublicUrl(path);
        if (!url) return;
        var pimg = $('img');
        pimg.src = url;
        pimg.alt = (ev.name ? ev.name + ' — ' : '') + 'recap photo ' + (i + 1);
        pimg.loading = 'lazy';
        pimg.onerror = function(){ this.remove(); };
        gallery.appendChild(pimg);
      });
      if (gallery.childNodes.length) recapSec.appendChild(gallery);
    }

    // Recording / slides link. STRICT scheme check (mirrors captains-console):
    // only an http(s) value becomes a live <a>; anything else renders as inert
    // text so a javascript:/data: scheme can never be clicked.
    if (ev.recap_url && String(ev.recap_url).trim()) {
      if (isSafeHttpUrl(ev.recap_url)) {
        var recapLink = $('a', 'recap-link', '▶ Watch the recording / slides');
        recapLink.href = ev.recap_url; recapLink.target = '_blank'; recapLink.rel = 'noopener';
        recapSec.appendChild(recapLink);
      } else {
        recapSec.appendChild($('div', 'recap-link-inert', String(ev.recap_url)));
      }
    }

    main.appendChild(recapSec);
  }

  // Description
  if (ev.description || extras.fullDescription) {
    var descSec = $('div', 'ev-section');
    var descText = $('div', 'ev-desc-text');
    var text = extras.fullDescription || ev.description;
    text.split(/\n\n+/).forEach(function(para) {
      descText.appendChild($('p', null, para));
    });
    descSec.appendChild(descText);
    main.appendChild(descSec);
  }

  // Speakers
  if (speakers && speakers.length) {
    var spkSec = $('div', 'ev-section');
    spkSec.appendChild($('div', 'ev-section-title', 'Speakers & Facilitators'));
    var wrap = $('div', 'speakers-carousel-wrap');
    var carousel = $('div', 'speakers-carousel'); carousel.id = 'speakers-carousel';
    speakers.forEach(function(spk) {
      var card = $('div', 'spk-card');
      if (spk.photo) {
        var p = $('img', 'spk-photo'); p.src = spk.photo; p.alt = spk.name; p.loading = 'lazy';
        p.onerror = function(){ var ph=$('div','spk-photo-placeholder',initials(spk.name)); this.replaceWith(ph); };
        card.appendChild(p);
      } else {
        card.appendChild($('div', 'spk-photo-placeholder', initials(spk.name)));
      }
      var info = $('div', 'spk-info');
      info.appendChild($('div', 'spk-name', spk.name));
      if (spk.role) info.appendChild($('div', 'spk-role', spk.role));
      if (spk.org) info.appendChild($('div', 'spk-org', spk.org));
      card.appendChild(info);
      carousel.appendChild(card);
    });
    wrap.appendChild(carousel);
    var nav = $('div', 'carousel-nav');
    var prev = $('button', 'carousel-btn', '‹'); prev.onclick = function(){ carousel.scrollBy({left:-176,behavior:'smooth'}); };
    var next = $('button', 'carousel-btn', '›'); next.onclick = function(){ carousel.scrollBy({left:176,behavior:'smooth'}); };
    nav.appendChild(prev); nav.appendChild(next);
    wrap.appendChild(nav);
    wrap.appendChild($('p', 'tba-note', 'More to be announced'));
    spkSec.appendChild(wrap);
    main.appendChild(spkSec);
  }

  // Schedule
  if (schedule && schedule.length) {
    var schSec = $('div', 'ev-section');
    schSec.appendChild($('div', 'ev-section-title', 'Schedule'));
    var timeline = $('div', 'schedule-timeline');
    schedule.forEach(function(blk) {
      var b = $('div', 'sched-block');
      b.appendChild($('div', 'sched-time', blk.time));
      var c = $('div', 'sched-content');
      c.appendChild($('div', 'sched-title', blk.title));
      if (blk.speaker) c.appendChild($('div', 'sched-speaker', blk.speaker));
      b.appendChild(c);
      timeline.appendChild(b);
    });
    schSec.appendChild(timeline);
    main.appendChild(schSec);
  }

  // Sponsors (per-event from DB/extras + always global Nebius)
  var sponsors = sponsorsFromSrc.concat([
    { name: 'Nebius', url: 'https://nebius.com' }
  ]);
  var sponSec = $('div', 'ev-section');
  sponSec.appendChild($('div', 'ev-section-title', 'Sponsors'));
  var logos = $('div', 'sponsor-logos');
  sponsors.forEach(function(s) {
    var a = $('a', 'sponsor-logo-link'); a.href = s.url || '#'; a.target = '_blank'; a.rel = 'noopener';
    if (s.logo) { var im=$('img'); im.src=s.logo; im.alt=s.name; a.appendChild(im); }
    else { a.appendChild($('span', 'sponsor-name-text', s.name)); }
    logos.appendChild(a);
  });
  sponSec.appendChild(logos);
  main.appendChild(sponSec);

  body.appendChild(main);

  // Sidebar
  var sidebar = $('div', 'ev-sidebar');
  var ctaCard = $('div', 'sidebar-card');
  var cta = $('div', 'sidebar-cta');
  if (ev.link) {
    // Same posture as the hero button: a past event can't be RSVP'd, so relabel
    // (more so when a recap exists) while preserving the Luma fallback link.
    var sideLumaLabel = isPast ? (hasRecap ? 'View event on Luma →' : 'View on Luma →') : 'RSVP on Luma →';
    var rsvpSide = $('a', 'sidebar-cta-primary', sideLumaLabel);
    rsvpSide.href = ev.link; rsvpSide.target = '_blank'; rsvpSide.rel = 'noopener';
    cta.appendChild(rsvpSide);
  }
  var chLink = $('a', 'sidebar-cta-secondary', '🌍 ClawCamp Chapters');
  chLink.href = '/chapters';
  cta.appendChild(chLink);
  // Inline on-site RSVP (v1.3): additive primary CTA inserted ABOVE the Luma
  // link. Degrades gracefully — the Luma CTAs above stay clickable if the RSVP
  // backend (submit-rsvp / rsvp_count) isn't deployed yet.
  buildRsvp(ev, isPast, cta);
  ctaCard.appendChild(cta);
  sidebar.appendChild(ctaCard);

  var detailCard = $('div', 'sidebar-card');
  detailCard.appendChild($('h4', null, 'Event Details'));
  var detailList = $('div', 'sidebar-detail-list');
  function detailRow(icon, main, sub) {
    var r = $('div', 'sidebar-detail-row');
    r.appendChild($('span', 'sidebar-detail-icon', icon));
    var t = $('div', 'sidebar-detail-text', main);
    if (sub) { var s = $('small', null, sub); t.appendChild(s); }
    r.appendChild(t);
    return r;
  }
  detailList.appendChild(detailRow('📅', fmtDate(ev.event_date), ev.time_range || ''));
  if (ev.location) detailList.appendChild(detailRow('📍', ev.venue_name || ev.location, ev.venue_name ? ev.location : ''));
  detailList.appendChild(detailRow('🎟️', 'Free · RSVP required', ''));
  detailCard.appendChild(detailList);
  sidebar.appendChild(detailCard);
  body.appendChild(sidebar);

  content.appendChild(body);

  // About + Get Involved
  var about = $('div', 'about-block');
  about.appendChild($('h3', null, 'About ClawCamp'));
  about.appendChild($('p', null, 'ClawCamp hosts events where organisations, experts, and mentors provide the tools, training, and support people need to advance along their Personal Agent journeys. Beginners acquire personal agents and powerful skills, while advanced attendees dive into multi-agent workflows, security, and token optimisation.'));
  content.appendChild(about);

  var gi = $('div', 'get-involved-band');
  [
    {icon:'🎤',title:'Mentor',desc:'Share your expertise with the community',href:'/speakers#apply'},
    {icon:'🎙️',title:'Speak',desc:'Present a talk or run a workshop',href:'/speakers#apply'},
    {icon:'💎',title:'Sponsor',desc:'Get your brand in front of AI builders',href:'/sponsors#contact'},
    {icon:'🤝',title:'Partner',desc:'Collaborate to expand your reach',href:'/get-involved'}
  ].forEach(function(c) {
    var card = $('a', 'gi-card'); card.href = c.href;
    card.appendChild($('span', 'gi-icon', c.icon));
    card.appendChild($('h4', null, c.title));
    card.appendChild($('p', null, c.desc));
    gi.appendChild(card);
  });
  content.appendChild(gi);
}

loadEvent();
</script>
</body>
</html>
